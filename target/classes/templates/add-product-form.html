<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<form th:action="@{/kiit/ecom/addProduct}" th:object="${product}" method="post" class="card p-4 shadow-sm">
        <div class="mb-3">
            <label for="title" class="form-label">Product Title</label>
            <input type="text" th:field="*{title}" class="form-control" id="title" placeholder="Enter title" required>
        </div>
        <div class="mb-3">
            <label for="desc" class="form-label">Product Description</label>
            <textarea th:field="*{description}" class="form-control" id="desc" rows="3" placeholder="Enter description" required></textarea>
        </div>
        <div class="mb-3">
            <label for="category" class="form-label">Product Category</label>
            <input type="text" th:field="*{category}" class="form-control" id="category" placeholder="Enter category" required>
        </div>
        <div class="mb-3">
            <label for="price" class="form-label">Product Price</label>
            <input type="number" th:field="*{price}" class="form-control" id="price" placeholder="Enter price" min="0" step="0.01" required>
        </div>
        
        <div class="mb-3">
            <label for="category" class="form-label">Product Image</label>
            <input type="text" th:field="*{image}" class="form-control" id="image" placeholder="Enter image" required>
        </div>
        
        <button type="submit" class="btn btn-success">Save Product</button>
    </form>


</body>
</html>
