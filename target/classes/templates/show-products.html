<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<a href="/kiit/ecom/add-product-form" class="btn btn-secondary mt-3 ml-5">Add Product</a>
<table class="table table-bordered table-hover align-middle text-center">
            <thead class="table-dark">
                <tr>
                    <th scope="col">Product Title</th>
                    <th scope="col">Product Description</th>
                    <th scope="col">Product Category</th>
                    <th scope="col">Product Price</th>
                    <th scope="col">Product Image</th>
                    <th scope="col">Delete</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.title}"></td>
                    <td th:text="${product.description}"></td>
                    <td th:text="${product.category}"></td>
                    <td th:text="'₹' +${product.price}"></td>
                    <td> <img th:src="${product.image}" width="100" height="80"/> </td>
                    <td> <a th:href="@{'/kiit/ecom/deleteProductFE/' + ${product.id}}"  class="btn btn-danger mt-3 ml-5" onclick="return confirm('Are you sure you want to delete this Product?');">Delete</a> </td>
                </tr>
            </tbody>
        </table>

</body>
</html>
